    * { box-sizing: border-box; font-family: Arial, sans-serif; }
    body { margin:0; height:100vh; display:flex; background:#f4f4f4; }

    /* LEFT PANEL */
    .controls{
      width: 340px;
      padding: 18px;
      background:#1e1e1e;
      color:#fff;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .controls h2{ margin:0; font-size:18px; }
    .controls button{
      width:100%;
      padding: 12px 12px;
      border:0;
      border-radius: 10px;
      cursor:pointer;
      background:#0078d4;
      color:#fff;
      font-size:14px;
      font-weight:700;
    }
    .controls button:hover{ background:#005ea6; }
    .controls .muted{ color:#bbb; font-size:12px; line-height:1.35; }

    /* RIGHT PANEL */
    .emulator-wrapper{
      flex: 1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 24px;
    }
    .phone{
      width: 390px;
      height: 760px;
      background:#111;
      border-radius: 34px;
      padding: 14px;
      box-shadow: 0 18px 50px rgba(0,0,0,.25);
      position: relative;
    }
    .phone::before{
      content:"";
      position:absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 140px;
      height: 22px;
      background:#000;
      border-radius: 0 0 16px 16px;
      opacity:.6;
      z-index:2;
    }
    .screen{
      width:100%;
      height:100%;
      background:#fff;
      border-radius: 26px;
      overflow:hidden;
      position: relative;
    }
    iframe{
      width:100%;
      height:100%;
      border:0;
      display:block;
      background:#fff;
    }

    /* Shell Toast */
    #shellToast{
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #111;
      color: #fff;
      padding: 12px 16px;
      border-radius: 999px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      font-weight: 700;
      font-size: 13px;
      display:none;
      z-index: 99999;
    }

    .status{
      position:absolute;
      top: 14px;
      left: 22px;
      right: 22px;
      height: 20px;
      z-index: 3;
      pointer-events:none;
      display:flex;
      justify-content:space-between;
      color:#fff;
      font-size:12px;
      opacity:.9;
    }
  </style>
</head>

<!DOCTYPE html>
<html lang="it">

  <style>

    body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
    .app-container { max-width: 420px; margin: 0 auto; min-height: 100vh; position: relative; display: flex; flex-direction: column; }

    .text-eni-teal { color: #117299; }
    .hover\:bg-eni-teal-darker:hover { background-color: #0d4f6f; }
    .bg-eni-teal-light { background-color: #e6f0f6; }
    .text-eni-teal-light { color: #117299; opacity: 0.7; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 40; }
    .modal-enter { animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes slideDown { from { transform: translateY(0); } to { transform: translateY(100%); } }
    .modal-exit { animation: slideDown 0.3s ease-out; }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* --- Strisce Blu: Wheel-like picker + timer --- */
    .wheel-wrap{
      position: relative;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      overflow: hidden;
      background: #fff;
    }
    .wheel-wrap::before{
      content:"";
      position:absolute;
      left:0; right:0;
      top: 50%;
      height: 44px;
      transform: translateY(-50%);
      border-top: 1px solid rgba(17,114,153,.25);
      border-bottom: 1px solid rgba(17,114,153,.25);
      background: rgba(17,114,153,.06);
      pointer-events:none;
    }
    .wheel-select{
      width: 100%;
      border: 0;
      outline: none;
      padding: 10px 12px;
      font-weight: 600;
      color: #111827;
      background: transparent;
    }
    .wheel-select option{
      padding: 10px;
      font-size: 16px;
    }

    .timer-card{
      background: linear-gradient(135deg, #117299 0%, #0d4f6f 60%, #1e9fd8 100%);
      color: white;
      border-radius: 18px;
      padding: 16px;
    }
    .timer-big{
      font-size: 44px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    /* in-app toast minimal (solo per demo, non obbligatorio) */
    #demoToast{
      position:fixed;
      top:14px;
      left:50%;
      transform:translateX(-50%);
      background:#117299;
      color:#fff;
      padding:10px 14px;
      border-radius:999px;
      font-size:13px;
      z-index:9999;
      display:none;
      box-shadow:0 10px 25px rgba(0,0,0,.2);
      font-weight:700;
    }

    /* Lock Screen Strisce Blu */
    .lock-screen{
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #0d2b3d 0%, #117299 50%, #0d4f6f 100%);
      z-index: 50000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      user-select: none;
      animation: lockScreenFadeIn 0.4s ease-out;
    }
    @keyframes lockScreenFadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    .lock-screen-content{
      text-align: center;
      padding: 20px;
    }

    .lock-screen-time{
      font-size: 48px;
      font-weight: 800;
      letter-spacing: 2px;
      margin: 40px 0 20px 0;
      font-family: 'Courier New', monospace;
      text-shadow: 0 4px 12px rgba(0,0,0,0.3);
    }

    .lock-screen-plate{
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 30px;
      letter-spacing: 3px;
      background: rgba(255,255,255,0.15);
      padding: 12px 20px;
      border-radius: 8px;
      display: inline-block;
      border: 2px solid rgba(255,255,255,0.3);
    }

    .lock-screen-label{
      font-size: 14px;
      opacity: 0.85;
      margin-bottom: 5px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .lock-screen-remaining{
      font-size: 36px;
      font-weight: 700;
      margin-top: 40px;
      font-family: 'Courier New', monospace;
      text-shadow: 0 4px 12px rgba(0,0,0,0.3);
    }

    .lock-screen-remaining-label{
      font-size: 12px;
      opacity: 0.8;
      margin-top: 10px;
      letter-spacing: 0.5px;
    }

    .lock-screen-hint{
      position: absolute;
      bottom: 40px;
      font-size: 13px;
      opacity: 0.7;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
  </style>
</head>

<body class="bg-gray-100">
  <div id="demoToast"></div>

  <div class="app-container bg-white shadow-lg"
    x-data="{
      currentPage: localStorage.getItem('currentPage') || 'home',
      showServiceDetail: false,
      selectedService: null,
      showRefuelModal: false,
      showBundleDetail: false,
      selectedBundle: null,
      selectedStation: null,
      selectedFuel: 'benzina',
      selectedAmount: 50,
      messages: [
        { type: 'bot', text: 'Ciao! Sono Eni Assistant. Come posso aiutarti oggi?' }
      ],
      messageInput: '',
      
      // Lock Screen
      showLockScreen: false,
      lockScreenCurrentTime: '00:00',
      lockScreenInterval: null,
      
      init() {
        this.$watch('currentPage', (val) => localStorage.setItem('currentPage', val));
        window.APP = this; // espone l'istanza per il bridge
      },

      updateLockScreenTime(){
        const now = new Date();
        const hh = String(now.getHours()).padStart(2,'0');
        const mm = String(now.getMinutes()).padStart(2,'0');
        this.lockScreenCurrentTime = `${hh}:${mm}`;
      },

      toggleLockScreen(){
        this.showLockScreen = !this.showLockScreen;
        if(this.showLockScreen){
          this.updateLockScreenTime();
          if(this.lockScreenInterval) clearInterval(this.lockScreenInterval);
          this.lockScreenInterval = setInterval(() => this.updateLockScreenTime(), 1000);
        } else {
          if(this.lockScreenInterval) clearInterval(this.lockScreenInterval);
          this.lockScreenInterval = null;
        }
      },

      /* =========================
         STRISCE BLU (NUOVO FLUSSO)
         ========================= */
      showBlueModal: false,
      sbStep: 'setup',               // 'setup' | 'timer'
      sbPlate: '',
      sbMode: 'wheel',               // 'wheel' | 'standard' | 'open'
      sbMinutes: 60,
      sbActive: false,
      sbEndTs: null,
      sbStartTs: null,
      sbTimerText: '00:00:00',
      sbMetaText: '',
      sbInterval: null,

      openBlue(){
        this.showBlueModal = true;
        this.sbStep = 'setup';
        this.sbMode = 'wheel';
        this.sbMinutes = 60;
        this.sbPlate = this.sbPlate || '';
        this.sbActive = false;
        this.sbMetaText = '';
      },

      sbSetMode(mode){
        this.sbMode = mode;
        if(mode === 'standard'){
          this.sbMinutes = 120;
        }
      },

      sbStart(){
        if(!this.sbPlate || this.sbPlate.trim().length < 5){
          this.sbMetaText = 'Inserisci una targa valida (min 5 caratteri).';
          return;
        }
        this.sbMetaText = '';
        const now = Date.now();

        if(this.sbMode === 'open'){
          this.sbStartTs = now;
          this.sbEndTs = null;
        } else {
          const mins = parseInt(this.sbMinutes || 0, 10);
          this.sbEndTs = now + (mins * 60 * 1000);
          this.sbStartTs = now;
        }

        this.sbActive = true;
        this.sbStep = 'timer';
        // NON mostrare il lock screen qui - solo nel modal timer
        this.sbTick();

        if(this.sbInterval) clearInterval(this.sbInterval);
        this.sbInterval = setInterval(() => this.sbTick(), 1000);
      },

      sbStop(){
        this.sbActive = false;
        this.showLockScreen = false;
        if(this.sbInterval) clearInterval(this.sbInterval);
        this.sbInterval = null;
        if(this.lockScreenInterval) clearInterval(this.lockScreenInterval);
        this.lockScreenInterval = null;
        this.sbMetaText = '';
        this.sbStep = 'setup';
      },

      sbTick(){
        if(!this.sbActive) return;
        const now = Date.now();

        if(this.sbMode === 'open'){
          const elapsed = Math.max(0, now - this.sbStartTs);
          this.sbTimerText = this.formatMs(elapsed);
        } else {
          const remaining = Math.max(0, this.sbEndTs - now);
          this.sbTimerText = this.formatMs(remaining);

          if(remaining <= 0){
            this.sbActive = false;
            this.showLockScreen = false; // Chiudi il lock screen quando termina
            if(this.sbInterval) clearInterval(this.sbInterval);
            this.sbInterval = null;
            this.sbMetaText = 'Sosta terminata (demo).';
          }
        }
      },

      formatMs(ms){
        const total = Math.floor(ms/1000);
        const hh = String(Math.floor(total/3600)).padStart(2,'0');
        const mm = String(Math.floor((total%3600)/60)).padStart(2,'0');
        const ss = String(total%60).padStart(2,'0');
        return `${hh}:${mm}:${ss}`;
      },

      sbNotifyExpiry(minutes=15){
        // apre direttamente timer countdown per X minuti (SOLO MODAL, senza lock screen)
        this.showBlueModal = true;
        this.sbStep = 'timer';
        this.sbMode = 'wheel';
        this.sbPlate = (this.sbPlate && this.sbPlate.trim().length >= 5) ? this.sbPlate : 'EZ123AB';
        this.sbMinutes = minutes;
        this.sbActive = true;

        const now = Date.now();
        this.sbStartTs = now;
        this.sbEndTs = now + minutes*60*1000;

        this.sbTick();
        if(this.sbInterval) clearInterval(this.sbInterval);
        this.sbInterval = setInterval(() => this.sbTick(), 1000);

        // toast in-app (opzionale)
        const t = document.getElementById('demoToast');
        if(t){
          t.textContent = `Mancano ${minutes} minuti alla scadenza`;
          t.style.display = 'block';
          clearTimeout(window.__inAppToastT);
          window.__inAppToastT = setTimeout(() => t.style.display='none', 1800);
        }
      },

      sbShowLockScreen(minutes=15){
        // Mostra il lock screen con timer
        // Se una sosta è già attiva, mantenerla; altrimenti avviane una nuova
        
        if(!this.sbActive){
          // Nessuna sosta attiva: crea una nuova
          this.sbPlate = this.sbPlate && this.sbPlate.trim().length >= 5 ? this.sbPlate : 'EZ123AB';
          this.sbMode = 'wheel';
          this.sbMinutes = minutes;
          
          const now = Date.now();
          this.sbStartTs = now;
          this.sbEndTs = now + minutes*60*1000;
          
          this.sbActive = true;
          
          if(this.sbInterval) clearInterval(this.sbInterval);
          this.sbInterval = setInterval(() => this.sbTick(), 1000);
        }
        
        // Mostra il lock screen e aggiorna l'orologio ogni secondo
        this.showLockScreen = true;
        this.updateLockScreenTime();
        if(this.lockScreenInterval) clearInterval(this.lockScreenInterval);
        this.lockScreenInterval = setInterval(() => this.updateLockScreenTime(), 1000);
        
        // Aggiorna il timer subito
        this.sbTick();
      }
    }">

  <script>
    const frame = document.getElementById('appFrame');
    const tpl = document.getElementById('protoSource');
    const toastEl = document.getElementById('shellToast');

    function showShellToast(text){
      toastEl.textContent = text;
      toastEl.style.display = 'block';
      clearTimeout(window.__shellToastT);
      window.__shellToastT = setTimeout(() => toastEl.style.display='none', 2000);
    }

    function loadApp(){
      frame.srcdoc = tpl.innerHTML.trim();
    }

    // helper: chiama API nell'iframe
    function callInApp(fn, ...args){
      const w = frame.contentWindow;
      if(w && w.DEMO && typeof w.DEMO[fn] === 'function'){
        return w.DEMO[fn](...args);
      }
      return false;
    }

    // SOLO UN BOTTONE: notifica scadenza
    document.getElementById('btnNotify').addEventListener('click', () => {
      showShellToast('Mancano 15 minuti alla scadenza');
      callInApp('blueExpiry', 15);
    });

    // BLOCCA TELEFONO: mostra lock screen
    document.getElementById('btnLockScreen').addEventListener('click', () => {
      showShellToast('Schermo bloccato');
      callInApp('lockScreen', 15);
    });

    // boot
    loadApp();
  </script>
