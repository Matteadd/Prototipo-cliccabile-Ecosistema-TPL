    _salvaClienteParziale() {
      // Salva i dati anagrafici, veicoli e consensi prima della verifica Cerved
      const cf = this.cliente.cf?.toUpperCase();
      if (!cf) return;
      const now = new Date().toISOString();
      // Veicoli dalle targhe inserite
      const veicoli = this.targhe.filter(t => t.trim()).map(t => ({
        id: 'v_' + t.toUpperCase(),
        targa: t.toUpperCase(),
        tipo: 'Auto',
        marca: '',
        modello: '',
        scadenze: {},
      }));
      // Consensi: usa sempre lo state corrente di consensiCrm
      const obbligatoriConfermati = this.otpSmsStatus === 'confirmed';
      const consensi = {
        privacy: this.consensiCrm.privacy,
        informativaPrecontrattuale: this.consensiCrm.informativaPrecontrattuale,
        terminiECondizioni: this.consensiCrm.nAndCMemo,
        marketing: this.consensiCrm.marketing,
        profilazione: this.consensiCrm.profilazione,
        mandatoSdd: false,
        dataFirma: obbligatoriConfermati ? now : null,
      };
      const telefonoVerificato = {
        verificato: this.telefonoCertificato,
        numero: this.telefonoCertificato ? (this.cliente.telefono || null) : null,
        data: this.telefonoCertificato ? now : null,
      };
      const emailVerificata = {
        verificata: this.emailVerificata,
        email: this.emailVerificata ? (this.cliente.email || null) : null,
        data: this.emailVerificata ? now : null,
      };
      // Preserva contratti e movimenti se cliente già esistente
      const esistente = this._lookupClienteDemo(cf);
      const record = {
        cf,
        nome: this.cliente.nome,
        cognome: this.cliente.cognome,
        dataNascita: this.cliente.dataNascita,
        contatti: { telefono: this.cliente.telefono, email: this.cliente.email },
        indirizzo: { via: this.cliente.indirizzo, civico: this.cliente.civico, comune: this.cliente.comune, prov: this.cliente.provincia, cap: this.cliente.cap },
        dataRegistrazione: esistente?.dataRegistrazione || now,
        canale: 'stazione',
        veicoli,
        consensi,
        telefonoVerificato,
        emailVerificata,
        contratti: esistente?.contratti || [],
        serviziAttivi: esistente?.serviziAttivi || {
          strisceBlu: { attivo: false },
          memo: { attivo: false },
        },
        _v3migrated: true,
        movimenti: esistente?.movimenti || [],
      };
      this._saveClienteDemo(record);
      // Emetti evento cliente:registrato? No, perché ancora non ha contratti.
      // Solo per aggiornare CRM: emetti evento cliente:profilo_aggiornato
      Bus.emit('cliente:profilo_aggiornato', record);
    },
    _lookupClienteDemo(cf) {
      return this._getClientiDemo()[cf.toUpperCase()] || null;
    },

    // Legge i campi anagrafici da un ClienteRecord supportando sia old-schema (flat) che new-schema (nested)
    _getAnagraficaFields(d) {
      const ind = d.indirizzo;
      const nested = ind && typeof ind === 'object';
      return {
        cf:        d.cf || '',
        nome:      d.nome || '', cognome: d.cognome || '',
        dataNascita: d.dataNascita || '',
        indirizzo: nested ? (ind.via || '')    : (ind || ''),
        civico:    nested ? (ind.civico || '') : (d.civico || ''),
        comune:    nested ? (ind.comune || '') : (d.comune || ''),
        provincia: nested ? (ind.prov || '')   : (d.provincia || ''),
        cap:       nested ? (ind.cap || '')    : (d.cap || ''),
        stato:     d.stato || 'Italia',
        telefono:  d.contatti?.telefono || d.telefono || '',
        email:     d.contatti?.email    || d.email    || '',
      };
    },

    simulateScan() {
      this.scanStatus = 'scanning';
      setTimeout(() => {
        // DEMO: se il toggle è attivo, genera sempre un nuovo cliente
        let dati, eraGiaCensito;
        if (this.isDemoMode && this.ocrAlwaysNewClient) {
          dati = this.generaDatiRandom();
          eraGiaCensito = false;
        } else {
          // Se ci sono clienti pre-registrati, simula la scansione del loro documento
          const reg = this._getClientiDemo();
          const cfList = Object.keys(reg);
          const esistente = cfList.length > 0 ? reg[cfList[Math.floor(Math.random() * cfList.length)]] : null;
          dati = esistente || this.generaDatiRandom();
          eraGiaCensito = !!esistente;
        }

        if (eraGiaCensito) {
          // Cliente già censito: precompila e salta direttamente allo step 3
          this.cliente = this._getAnagraficaFields(dati);
          const targheCliente = (dati.veicoli || []).map(v => v.targa).filter(Boolean);
          this.targhe = targheCliente.length ? targheCliente : (dati.targhe?.length ? [...dati.targhe] : ['']);
          // Popola consensiCrm dai consensi del record
          if (dati.consensi) {
            this.consensiCrm.privacy = !!dati.consensi.privacy;
            this.consensiCrm.informativaPrecontrattuale = !!dati.consensi.informativaPrecontrattuale;
            this.consensiCrm.nAndCMemo = !!dati.consensi.terminiECondizioni;
            this.consensiCrm.marketing = !!dati.consensi.marketing;
            this.consensiCrm.profilazione = !!dati.consensi.profilazione;
          }
          this.cfVerifyStatus = 'ok';
          this.cfAlreadyExists = true;
          this.clienteReadonly = true;
          this.telefonoCertificato = !!(dati.telefonoVerificato?.verificato);
          this.creditCheckStatus = dati.cervedStatus || null;
          this.scanStatus = 'done';
          this.showToastMsg('Cliente già censito — dati precompilati in sola lettura', 'warning');
          setTimeout(() => { this.step2Sub = 'anagrafica'; }, 1200);
        } else {
          // Nuovo cliente: precompila la form e mostra step 2b come sempre
          this.cliente = {
            cf: dati.cf, nome: dati.nome, cognome: dati.cognome,
            dataNascita: dati.dataNascita, indirizzo: dati.indirizzo, civico: dati.civico,
            comune: dati.comune, provincia: dati.provincia, cap: dati.cap,
            stato: dati.stato, telefono: dati.telefono, email: dati.email,
          };
          this.targhe = [dati._targa];
          this.cfVerifyStatus = 'ok';
          this.cfAlreadyExists = false;
          this.clienteReadonly = false;
          this.scanStatus = 'done';
          this.showToastMsg('Documento acquisito con successo', 'success');
        }
      }, 1500);
    },

    goToManual() {
      this.scanMode = 'manual';
      this.manualSearchMode = 'cf';
      this.manualSearchCf = '';
      this.manualSearchCfStatus = null;
      this.manualSearchCfResult = null;
      this.manualSearchTarga = '';
      this.manualSearchTargaStatus = null;
      this.manualSearchTargaResults = [];
      this.step2Sub = 'ricerca';
    },

    manualLookupCF() {
      const cf = this.manualSearchCf.trim().toUpperCase();
      if (!cf || cf.length < 3) return;
      this.manualSearchCfStatus = 'searching';
      setTimeout(() => {
        const found = this._lookupClienteDemo(cf);
        if (found) {
          this.manualSearchCfResult = found;
          this.manualSearchCfStatus = 'found';
        } else {
          this.manualSearchCfResult = null;
          this.manualSearchCfStatus = 'notfound';
        }
      }, 600);
    },

    manualLookupTarga() {
      const targa = this.manualSearchTarga.trim().toUpperCase();
      if (!targa || targa.length < 3) return;
      this.manualSearchTargaStatus = 'searching';
      setTimeout(() => {
        const reg = this._getClientiDemo();
        const results = Object.values(reg).filter(c =>
          (c.veicoli || []).some(v => v.targa.toUpperCase() === targa)
          || (c.targhe || []).some(t => t.toUpperCase() === targa)
        );
        if (results.length > 0) {
          this.manualSearchTargaResults = results;
          this.manualSearchTargaStatus = 'found';
        } else {
          this.manualSearchTargaResults = [];
          this.manualSearchTargaStatus = 'notfound';
        }
      }, 600);
    },

    manualSelectClient(dati) {
      this.cliente = this._getAnagraficaFields(dati);
      const targheCliente = (dati.veicoli || []).map(v => v.targa).filter(Boolean);
      this.targhe = targheCliente.length ? targheCliente : (dati.targhe?.length ? [...dati.targhe] : ['']);
      this.cfVerifyStatus = 'ok';
      this.cfAlreadyExists = true;
      this.clienteReadonly = true;
      // Popola consensiCrm dai consensi del record
      if (dati.consensi) {
        this.consensiCrm.privacy = !!dati.consensi.privacy;
        this.consensiCrm.informativaPrecontrattuale = !!dati.consensi.informativaPrecontrattuale;
        this.consensiCrm.nAndCMemo = !!dati.consensi.terminiECondizioni;
        this.consensiCrm.marketing = !!dati.consensi.marketing;
        this.consensiCrm.profilazione = !!dati.consensi.profilazione;
      }
      this.telefonoCertificato = !!(dati.telefonoVerificato?.verificato);
      this.creditCheckStatus = dati.cervedStatus || null;
      this.step2Sub = 'anagrafica';
    },

    manualNewClient() {
      const cf = this.manualSearchCf.trim().toUpperCase();
      this.cliente = { cf, nome: '', cognome: '', dataNascita: '', indirizzo: '', civico: '', comune: '', provincia: '', cap: '', stato: 'Italia', telefono: '', email: '' };
      this.targhe = [''];
      this.cfVerifyStatus = cf.length === 16 ? 'ok' : null;
      this.cfAlreadyExists = false;
      this.clienteReadonly = false;
      this.step2Sub = 'anagrafica';
    },

    verifyCF() {
      const cf = this.cliente.cf.trim().toUpperCase();
      if (!cf) return;
      if (cf.length !== 16) {
        this.cfVerifyStatus = 'ko';
        return;
      }
      this.cfVerifyStatus = 'checking';
      setTimeout(() => {
        if (cf === 'TSTKO0000000000A') {
          this.cfVerifyStatus = 'ko';
          this.showToastMsg('CF non valido — impossibile procedere', 'error');
          return;
        }

        // Cerca nel registry clienti demo (clienti già onboardati in questa sessione)
        const stored = this._lookupClienteDemo(cf);
        if (stored) {
          this.cfVerifyStatus = 'ok';
          this.cfAlreadyExists = true;
          this.clienteReadonly = true;
          Object.assign(this.cliente, this._getAnagraficaFields(stored));
          if (!this.targhe.some(t => t.trim())) {
            const targheStored = (stored.veicoli || []).map(v => v.targa).filter(Boolean);
            if (targheStored.length) this.targhe = targheStored;
            else if (stored.targhe?.length) this.targhe = [...stored.targhe];
          }
          // Popola consensiCrm dai consensi del record
          if (stored.consensi) {
            this.consensiCrm.privacy = !!stored.consensi.privacy;
            this.consensiCrm.informativaPrecontrattuale = !!stored.consensi.informativaPrecontrattuale;
            this.consensiCrm.nAndCMemo = !!stored.consensi.terminiECondizioni;
            this.consensiCrm.marketing = !!stored.consensi.marketing;
            this.consensiCrm.profilazione = !!stored.consensi.profilazione;
          }
          this.telefonoCertificato = !!(stored.telefonoVerificato?.verificato);
          this.creditCheckStatus = stored.cervedStatus || null;
          this.showToastMsg('Cliente già censito nel registry demo — dati precompilati', 'warning');
          return;
        }

        // CF di test hardcoded: TSTENI... → cliente esistente Gruppo Eni
        if (cf.startsWith('TSTENI')) {
          this.cfVerifyStatus = 'ok';
          this.cfAlreadyExists = true;
          this.clienteReadonly = true;
          this.cliente.nome = 'Laura';
          this.cliente.cognome = 'Bianchi';
          this.cliente.dataNascita = '1985-06-15';
          this.cliente.indirizzo = 'Via Verdi';
          this.cliente.civico = '5';
          this.cliente.comune = 'Roma';
          this.cliente.provincia = 'RM';
          this.cliente.cap = '00100';
          this.cliente.telefono = '+39 347 9876543';
          this.cliente.email = 'laura.bianchi@email.it';
          if (!this.targhe.some(t => t.trim())) this.targhe = ['EF456GH'];
          this.showToastMsg('Cliente già registrato su app Gruppo Eni — dati precompilati', 'warning');
          return;
        }

        this.cfVerifyStatus = 'ok';
      }, 800);
    },

    consensiStatus() {
      const m = this.consensiCrm;
      const mandatoryOk = m.privacy && m.informativaPrecontrattuale && m.nAndCMemo;
      const optionalMissing = !m.marketing || !m.profilazione;
      if (mandatoryOk && !optionalMissing) return 'completo';
      if (mandatoryOk && optionalMissing) return 'optional_only';
      return 'mancanti';
    },

    goToOtp() {
      const c = this.cliente;
      if (!c.cf || !c.nome || !c.cognome || !c.dataNascita || !c.indirizzo || !c.comune || !c.telefono) {
        this.showToastMsg('Compila tutti i campi obbligatori (*)', 'error');
        return;
      }
      if (this.cfVerifyStatus !== 'ok') {
        this.showToastMsg('Verifica il codice fiscale prima di procedere', 'error');
        return;
      }
      if (!this.targhe.some(t => t.trim())) {
        this.showToastMsg('Inserisci almeno una targa', 'error');
        return;
      }
      if (this.cfAlreadyExists) {
        // Per clienti esistenti: verifica i 3 consensi obbligatori + certificazione telefono
        const mandatoryConsentsOk = this.consensiCrm.privacy &&
          this.consensiCrm.informativaPrecontrattuale &&
          this.consensiCrm.nAndCMemo;
        if (mandatoryConsentsOk && this.telefonoCertificato) {
          this.nextStep();
          this.showToastMsg('Consensi e numero certificato verificati — procedo con la valutazione creditizia', 'success');
          return;
        }
        // Manca qualcosa: vai a OTP (SMS dinamico costruito in sendOtpSms)
        this.consensiSmsOpzionale = false;
      }
      this.step2Sub = 'otp';
    },

    sendOtpSms() {
      this.otpSmsStatus = 'sent';
      this.otpSmsFieldEnabled = false;

      // Costruisci dinamicamente la lista documenti da includere nell'SMS
      // Per clienti esistenti: solo quelli mancanti; per nuovi: tutti e tre
      const documentiMancanti = [];
      if (!this.consensiCrm.informativaPrecontrattuale) documentiMancanti.push('informativa_precontrattuale');
      if (!this.consensiCrm.privacy) documentiMancanti.push('privacy');
      if (!this.consensiCrm.nAndCMemo) documentiMancanti.push('norme_memo');
      const documenti = this.cfAlreadyExists
        ? documentiMancanti
        : ['informativa_precontrattuale', 'privacy', 'norme_memo'];

      // Preview dinamica in base a cosa manca
      const phonePending = this.cfAlreadyExists && !this.telefonoCertificato;
      let preview;
      if (phonePending && documentiMancanti.length > 0) {
        preview = 'Enilive: certifica il numero e accetta i documenti richiesti: [link mock]';
      } else if (phonePending) {
        preview = 'Enilive: certifica il tuo numero di telefono tramite OTP: [link mock]';
      } else if (documentiMancanti.length > 0) {
        preview = 'Enilive: accetta i documenti mancanti per completare la registrazione: [link mock]';
      } else {
        preview = 'Conferma i tuoi dati e accetta i documenti Enilive: [link mock]';
      }

      Bus.emit('sms:outbound', {
        id: 'sms_consensi',
        to: this.cliente.telefono,
        template: 'OTP_CONSENSI',
        preview,
        documenti: documenti.length > 0 ? documenti : ['informativa_precontrattuale', 'privacy', 'norme_memo'],
        ...(phonePending ? { certificaTelefono: true } : {}),
      });
      this.showToastMsg('SMS inviato al ' + this.cliente.telefono, 'info');
    },

    confirmOtpSms() {
      const input = this.otpSmsInput.trim();
      if (/^\d{4}$/.test(input)) {
        this.otpSmsStatus = 'confirmed';
        this.telefonoCertificato = true;
        this.consensiCrm.informativaPrecontrattuale = true;
        this.consensiCrm.privacy = true;
        this.consensiCrm.nAndCMemo = true;
        // Persisti in localStorage se il record esiste già (cliente esistente)
        try {
          const cf = (this.cliente.cf || '').toUpperCase();
          if (cf) {
            const reg = JSON.parse(localStorage.getItem('clientiDemo') || '{}');
            const record = reg[cf];
            if (record) {
              const now = new Date().toISOString();
              const numero = record.contatti?.telefono || this.cliente.telefono || null;
              record.telefonoVerificato = { verificato: true, numero, data: now };
              record.consensi = {
                ...(record.consensi || {}),
                informativaPrecontrattuale: true,
                privacy: true,
                terminiECondizioni: true,
                dataFirma: now,
              };
              localStorage.setItem('clientiDemo', JSON.stringify(reg));
              Bus.emit('cliente:telefono_verificato', { cf, numero, data: now });
            }
          }
        } catch(_) {}
        this.showToastMsg('Numero certificato', 'success');
      } else {
        this.showToastMsg('OTP non valido — riprova', 'error');
      }
    },

    sendMktSms() {
      this.mktSmsStatus = 'sent';
      this.mktSmsOtpFieldEnabled = false;
      this.mktSmsOtpInput = '';
      Bus.emit('sms:outbound', {
        id: 'sms_mkt_consensi',
        to: this.cliente.telefono,
        template: 'CONSENSI_MARKETING',
        preview: 'Enilive: conferma le tue preferenze di comunicazione',
        consensiPrecompilati: {
          marketing: !!this.consensiCrm.marketing,
          profilazione: !!this.consensiCrm.profilazione,
        },
      });
      this.showToastMsg('SMS consensi inviato al ' + this.cliente.telefono, 'info');
    },

    confirmMktOtp() {
      const input = this.mktSmsOtpInput.trim();
      if (/^\d{4}$/.test(input)) {
        this.mktSmsStatus = 'confirmed';
        this.consensiCrm.marketing = this.mktCustomerMarketing;
        this.consensiCrm.profilazione = this.mktCustomerProfilazione;
        this.showToastMsg('Consensi marketing confermati', 'success');
      } else {
        this.showToastMsg('OTP non valido — riprova', 'error');
      }
    },

    sendOtpEmail() {
      if (!this.cliente.email?.trim()) {
        this.otpEmailStatus = 'skipped';
        this.showToastMsg('Email non fornita — step saltato (facoltativo)', 'info');
        return;
      }
      this.otpEmailStatus = 'sent';
      Bus.emit('email:outbound', {
        id: 'email_otp_' + Date.now(),
        to: this.cliente.email,
        template: 'OTP_EMAIL',
        subject: 'Verifica il tuo indirizzo email — Enilive',
        otpCode: '3456',
        nome: this.cliente.nome,
        preview: 'Ciao ' + this.cliente.nome + ', usa il codice 3456 per verificare il tuo indirizzo email',
      });
      this.showToastMsg('Email di verifica inviata a ' + this.cliente.email, 'info');
    },

    confirmOtpEmail() {
      const input = this.otpEmailInput.trim();
      if (input === '3456') {
        this.otpEmailStatus = 'confirmed';
        this.emailVerificata = true;
        this.showToastMsg('Email verificata', 'success');
      } else {
        this.showToastMsg('OTP non valido — riprova', 'error');
      }
    },

    addTarga() {
      if (this.targhe.length < 5) this.targhe.push('');
    },

    removeTarga(i) {
      if (this.targhe.length > 1) this.targhe.splice(i, 1);
    },

    // ============================================================
    // STEP 3 — VALUTAZIONE CREDITIZIA
    // ============================================================
    runCreditCheck() {
      this.creditCheckStatus = 'checking';
      setTimeout(() => {
        const cf = this.cliente.cf.toUpperCase();
        if (cf.endsWith('KO2') || cf.endsWith('KO 2')) {
          this.creditCheckStatus = 'ok_rsa_only';
        } else if (cf.endsWith('KO')) {
          this.creditCheckStatus = 'ko';
        } else {
          this.creditCheckStatus = 'ok_full';
        }
        // Persiste cervedStatus in clientiDemo e notifica il CRM via bus
        try {
          const reg = JSON.parse(localStorage.getItem('clientiDemo') || '{}');
          const record = reg[cf];
          if (record) {
            record.cervedStatus = this.creditCheckStatus;
            localStorage.setItem('clientiDemo', JSON.stringify(reg));
            Bus.emit('cliente:cerved_aggiornato', { cf, cervedStatus: this.creditCheckStatus });
          }
        } catch(_) {}
      }, 2000);
    },

    // ============================================================
    // STEP 4 — CONFIGURAZIONE CONTRATTO
    // ============================================================
    calcContratto1Total() {
      // Prezzi: OBU #1 €2.50 | OBU #2 €1.00 | RSA €2.50 | Furto €0.30 | RSA Standalone €2.50
      let t = 0;
      // Nuovo path RSA standalone (step 4 selezione servizio)
      if (this.tabletServizioSelezionato === 'rsa_standalone') {
        return this.rsaStandaloneTarghe.filter(t => t.targa.trim()).length * 2.50;
      }
      if (this.creditCheckStatus !== 'ok_rsa_only') {
        t += 2.50; // OBU #1 (telepedaggio incluso)
        if (this.obu1Rsa)   t += 2.50;
        if (this.obu1Furto) t += 0.30;
        if (this.hasObu2) {
          t += 1.00; // OBU #2
          if (this.obu2Rsa)   t += 2.50;
          if (this.obu2Furto) t += 0.30;
        }
      }
      // RSA standalone
      t += this.rsaStandalone.filter(r => r.targa.trim()).length * 2.50;
      return t;
    },

    calcContratto2Total() {
      let t = 0;
      t += 2.50; // OBU #1 contratto 2
      if (this.c2obu1Rsa)   t += 2.50;
      if (this.c2obu1Furto) t += 0.30;
      if (this.c2hasObu2) {
        t += 1.00; // OBU #2
        if (this.c2obu2Rsa)   t += 2.50;
        if (this.c2obu2Furto) t += 0.30;
      }
      t += this.c2rsaStandalone.filter(r => r.targa.trim()).length * 2.50;
      return t;
    },

    addUpsellRsa() {
      const daAggiungere = this.upsellRsaTarghe.filter(r => r.targa.trim())
        .map(r => ({targa: r.targa.trim().toUpperCase(), _addNew: false, _newVal: ''}));
      const nuove = daAggiungere.filter(r => !this._rsaGiaAttivaPerTarga(r.targa));
      const duplicate = daAggiungere.filter(r => this._rsaGiaAttivaPerTarga(r.targa));
      if (nuove.length > 0) {
        if (this.upsellRsaContrattoTarget === 0) {
          this.rsaStandalone.push(...nuove);
        } else {
          const c = this.contrattiAggiuntivi[this.upsellRsaContrattoTarget - 1];
          if (!c.rsaStandalone) c.rsaStandalone = [];
          c.rsaStandalone.push(...nuove);
        }
      }
      this.upsellMode = null;
      this.upsellRsaTarghe = [];
      if (duplicate.length > 0) {
        this.upsellRsaAggiuntivaMode = true;
        this.upsellRsaAggiuntivaTarghe = duplicate.map(r => r.targa);
        this.upsellRsaAggiuntivaSmsSent = false;
        this.upsellRsaAggiuntivaOtpEnabled = false;
        this.upsellRsaAggiuntivaOtpInput = '';
        this.upsellRsaAggiuntivaOtpConfirmed = false;
        const msg = nuove.length > 0
          ? `${nuove.length} RSA aggiunt${nuove.length === 1 ? 'a' : 'e'}. Richiesta integrazione per ${duplicate.length} già attiv${duplicate.length === 1 ? 'a' : 'e'}.`
          : `RSA già attiv${duplicate.length === 1 ? 'a' : 'e'} — avvia integrazione contratto.`;
        this.showToastMsg(msg, 'info', 4000);
      } else {
        const nContratto = this.upsellRsaContrattoTarget + 1;
        this.showToastMsg(`${daAggiungere.length} RSA aggiunt${daAggiungere.length === 1 ? 'a' : 'e'} al contratto ${nContratto}`, 'success');
      }
    },

    _rsaGiaAttivaPerTarga(targa) {
      if (!targa || !this.cliente?.cf) return false;
      try {
        const clienti = JSON.parse(localStorage.getItem('clientiDemo') || '{}');
        const rec = clienti[this.cliente.cf.toUpperCase()];
        return (rec?.serviziRsa || []).some(r => r.veicoloId === 'v_' + targa.toUpperCase() && r.stato === 'attivo');
      } catch(e) { return false; }
    },

    sendRsaAggiuntivaSms() {
      this.upsellRsaAggiuntivaSmsSent = true;
      this.upsellRsaAggiuntivaOtpEnabled = false;
      Bus.emit('sms:outbound', {
        id: 'sms_rsa_aggiuntiva',
        to: this.cliente.telefono,
        template: 'FIRMA_RSA_AGGIUNTIVA',
        preview: 'Firma il modulo di adesione aggiuntivo RSA: [link mock]',
        dati: {
          nome: this.cliente.nome + ' ' + this.cliente.cognome,
          cf: this.cliente.cf,
          targhe: this.upsellRsaAggiuntivaTarghe.join(', '),
        },
      });
      this.showToastMsg('Link documento inviato via SMS al cliente', 'info');
    },

    confirmRsaAggiuntivaOtp() {
      const input = this.upsellRsaAggiuntivaOtpInput.trim();
      if (!/^\d{4}$/.test(input)) {
        this.showToastMsg('Codice OTP non valido — inserisci 4 cifre', 'error');
        return;
      }
      this.upsellRsaAggiuntivaOtpConfirmed = true;
      this.showToastMsg('Integrazione RSA confermata', 'success');
    },

    avviaNuovoContratto() {
      this.c2obu1Targa = ''; this.c2obu1Rsa = true; this.c2obu1Furto = true;
      this.c2obu1AddNew = false; this.c2obu1NewVal = '';
      this.c2hasObu2 = false; this.c2obu2Targa = ''; this.c2obu2Rsa = true; this.c2obu2Furto = true;
      this.c2obu2AddNew = false; this.c2obu2NewVal = '';
      this.c2rsaStandalone = [];
      this.c2iban = this.iban; this.c2ibanVerifyStatus = this.ibanVerifyStatus;
      this.upsellEditingIdx = null;
      this._upsellEditingBackup = null;
      this.upsellMode = 'nuovo-contratto';
    },

    confermaContrattoAggiunto() {
      const snapshot = {
        obu1Targa: this.c2obu1Targa, obu1Rsa: this.c2obu1Rsa, obu1Furto: this.c2obu1Furto,
        hasObu2: this.c2hasObu2, obu2Targa: this.c2obu2Targa, obu2Rsa: this.c2obu2Rsa, obu2Furto: this.c2obu2Furto,
        rsaStandalone: [...this.c2rsaStandalone],
        iban: this.c2iban, ibanVerifyStatus: this.c2ibanVerifyStatus,
      };
      if (this.upsellEditingIdx !== null) {
        this.contrattiAggiuntivi.splice(this.upsellEditingIdx, 0, snapshot);
      } else {
        this.contrattiAggiuntivi.push(snapshot);
      }
      const n = this.upsellEditingIdx !== null ? this.upsellEditingIdx + 2 : this.contrattiAggiuntivi.length + 1;
      this.upsellMode = null;
      this.upsellEditingIdx = null;
      this._upsellEditingBackup = null;
      this.showToastMsg('Contratto ' + n + ' configurato', 'success');
    },

    modificaContrattoAggiunto(idx) {
      const c = this.contrattiAggiuntivi[idx];
      this._upsellEditingBackup = { ...c, rsaStandalone: [...(c.rsaStandalone || [])] };
      this.c2obu1Targa = c.obu1Targa; this.c2obu1Rsa = c.obu1Rsa; this.c2obu1Furto = c.obu1Furto;
      this.c2obu1AddNew = false; this.c2obu1NewVal = '';
      this.c2hasObu2 = c.hasObu2; this.c2obu2Targa = c.obu2Targa; this.c2obu2Rsa = c.obu2Rsa; this.c2obu2Furto = c.obu2Furto;
      this.c2obu2AddNew = false; this.c2obu2NewVal = '';
      this.c2rsaStandalone = [...(c.rsaStandalone || [])];
      this.c2iban = c.iban; this.c2ibanVerifyStatus = c.ibanVerifyStatus;
      this.contrattiAggiuntivi.splice(idx, 1);
      this.upsellEditingIdx = idx;
      this.upsellMode = 'nuovo-contratto';
    },

    cancellaEditContratto() {
      if (this.upsellEditingIdx !== null && this._upsellEditingBackup) {
        this.contrattiAggiuntivi.splice(this.upsellEditingIdx, 0, this._upsellEditingBackup);
      }
      this.upsellMode = null;
      this.upsellEditingIdx = null;
      this._upsellEditingBackup = null;
    },

    calcContrattoAggiuntoTotal(c) {
      let t = 2.50;
      if (c.obu1Rsa)   t += 2.50;
      if (c.obu1Furto) t += 0.30;
      if (c.hasObu2) {
        t += 1.00; // OBU #2
        if (c.obu2Rsa)   t += 2.50;
        if (c.obu2Furto) t += 0.30;
      }
      t += (c.rsaStandalone || []).filter(r => (r.targa || '').trim()).length * 2.50;
      return t;
    },

    // kept for backward compat (editing form live preview)
    confermaContratto2() { this.confermaContrattoAggiunto(); },

    verifyIban() {
      if (!this.iban.trim()) { this.showToastMsg('Inserisci un IBAN', 'error'); return; }
      this.ibanVerifyStatus = 'checking';
      setTimeout(() => {
        const clean = this.iban.replace(/\s/g, '').toUpperCase();
        if (clean.startsWith('IT') && clean.length >= 15) {
          this.ibanVerifyStatus = 'ok';
          this.showToastMsg('IBAN verificato', 'success');
        } else {
          this.ibanVerifyStatus = 'ko';
          this.showToastMsg('IBAN non valido o titolarità non verificata', 'error');
        }
      }, 1000);
    },

    verifyIban2() {
      if (!this.c2iban.trim()) { this.showToastMsg('Inserisci un IBAN per il contratto 2', 'error'); return; }
      this.c2ibanVerifyStatus = 'checking';
      setTimeout(() => {
        const clean = this.c2iban.replace(/\s/g, '').toUpperCase();
        if (clean.startsWith('IT') && clean.length >= 15) {
          this.c2ibanVerifyStatus = 'ok';
          this.showToastMsg('IBAN contratto 2 verificato', 'success');
        } else {
          this.c2ibanVerifyStatus = 'ko';
          this.showToastMsg('IBAN contratto 2 non valido', 'error');
        }
      }, 1000);
    },

        this.obuCode = 'OBU-EN-2026-00421';

    associaObu() {

      this.showToastMsg('Targa ' + this.targaSelezionata.toUpperCase() + ' associata a dispositivo ' + this.obuCode, 'success');
    },

    scanObu2() {
      this.obuScanStatus2 = 'scanning';
      setTimeout(() => {

        this.obuScanStatus2 = 'ok';

      }, 1000);
    },

    associaObu2() {
      if (!this.obuCode2 || !this.targaSelezionata2 || this.targaSelezionata2 === '__manual2__') {
        this.showToastMsg('Compila codice OBU e targa per il secondo dispositivo', 'error');

    // ============================================================
    // STEP 6 — FIRMA
    // ============================================================
    sendContrattoSms() {
      this.contrattoSmsInviato = true;
      this.firmaOtpFieldEnabled = false;
      const isRsaOnly = this.creditCheckStatus === 'ok_rsa_only'
        || this.tabletServizioSelezionato === 'rsa_standalone';
      const tipoContratto = isRsaOnly ? 'RSA Stand-Alone' : (this.hasObu2 ? 'OBU Dual + servizi' : 'OBU + servizi');
      const totaleContratto = this.calcContratto1Total() + (this.contratto2Attivo ? this.calcContratto2Total() : 0);
      Bus.emit('sms:outbound', {
        id: 'sms_contratto',
        to: this.cliente.telefono,
        template: 'FIRMA_CONTRATTO',
        preview: 'Firma il tuo contratto Enilive: [link mock]',
        dati: {
          nome: this.cliente.nome + ' ' + this.cliente.cognome,
          cf: this.cliente.cf,
          bundle: tipoContratto,
          totale: totaleContratto,
        },
      });
      Bus.emit('contratto:inviato', {
        cliente: this.cliente.nome + ' ' + this.cliente.cognome,
        bundle: tipoContratto,
      });
      this.showToastMsg('Link contratto inviato via SMS al cliente', 'info');
    },

    confirmFirma() {
      const input = this.firmaOtpInput.trim();
      if (!/^\d{4}$/.test(input)) {
        this.showToastMsg('Codice OTP non valido — chiedi al cliente di riprovare', 'error');
        return;
      }
      this.firmaStatus = 'pending';
      setTimeout(() => {
        this.firmaStatus = 'signed';
        this.completaOnboarding();
      }, 1200);
    },

    async completaOnboarding() {
      this.flowCompleted = true;

      const now = new Date().toISOString();
      const cf = this.cliente.cf.toUpperCase();
      const isRsaOnly = this.creditCheckStatus === 'ok_rsa_only'
        || this.tabletServizioSelezionato === 'rsa_standalone';

      // Leggi record esistente se presente
      const existing = this._lookupClienteDemo(cf);

      // 1. Raccoglie tutte le targhe (deduplicate, uppercase) per costruire veicoli[]
      const allTarghe = [...new Set([
        ...this.targhe.filter(t => t.trim()).map(t => t.toUpperCase()),
        ...this.rsaStandaloneTarghe.filter(t => t.targa.trim()).map(t => t.targa.toUpperCase()),
        ...(this.obu1Targa ? [this.obu1Targa.toUpperCase()] : []),
        ...(this.hasObu2 && this.obu2Targa ? [this.obu2Targa.toUpperCase()] : []),
        ...this.rsaStandalone.filter(r => r.targa.trim()).map(r => r.targa.toUpperCase()),
        ...this.contrattiAggiuntivi.flatMap(c => [
          ...(c.obu1Targa ? [c.obu1Targa.toUpperCase()] : []),
          ...(c.hasObu2 && c.obu2Targa ? [c.obu2Targa.toUpperCase()] : []),
          ...(c.rsaStandalone || []).filter(r => r.targa && r.targa.trim()).map(r => r.targa.toUpperCase()),
        ]),
      ].filter(Boolean))];

      const veicoli = allTarghe.map(t => ({ id: 'v_' + t, targa: t, tipo: 'Auto', marca: '', modello: '', scadenze: {} }));

      // 2. Costruisce contratti v3: dispositivi[] OBU con serviziAbilitati, serviziRsa[] nel contratto
      const obu1Targa = (this.obu1Targa || this.targaSelezionata || '').toUpperCase();
      const obu2Targa = (this.obu2Targa || this.targaSelezionata2 || '').toUpperCase();
      let rsaIdx = 1;
      const mkRsa = vid => ({ id: 'rsa_' + String(rsaIdx++).padStart(3, '0'), veicoloId: vid, stato: 'attivo', costo: 2.00 });
      const contratti = [
        {
          id: 'c1_' + cf.substring(0, 8),
          tipo: isRsaOnly ? 'rsa_standalone' : 'obu',
          stato: 'attivo',
          dataAttivazione: now,
          iban: this.iban,
          totale: this.calcContratto1Total(),
          dispositivi: isRsaOnly ? [] : [
            { tipo: 'obu', codice: this.obuCode, veicoloId: 'v_' + obu1Targa, furtoSmarrimento: this.obu1Furto, stato: 'attivo',
              serviziAbilitati: { areac: { attivo: false }, parcheggi: { attivo: false } } },
            ...(this.hasObu2 && obu2Targa ? [{ tipo: 'obu', codice: this.obuCode2, veicoloId: 'v_' + obu2Targa, furtoSmarrimento: this.obu2Furto, stato: 'attivo',
              serviziAbilitati: { areac: { attivo: false }, parcheggi: { attivo: false } } }] : []),
          ],
          serviziRsa: [
            ...(!isRsaOnly && this.obu1Rsa && obu1Targa ? [mkRsa('v_' + obu1Targa)] : []),
            ...(!isRsaOnly && this.hasObu2 && this.obu2Rsa && obu2Targa ? [mkRsa('v_' + obu2Targa)] : []),
            ...(!isRsaOnly ? this.rsaStandalone.filter(r => r.targa.trim()).map(r => mkRsa('v_' + r.targa.toUpperCase())) : []),
            ...(isRsaOnly && this.tabletServizioSelezionato === 'rsa_standalone'
              ? this.rsaStandaloneTarghe.filter(t => t.targa.trim()).map(t => mkRsa('v_' + t.targa.toUpperCase()))
              : []),
            ...(isRsaOnly && this.creditCheckStatus === 'ok_rsa_only' && this.targhe[0]
              ? [mkRsa('v_' + this.targhe[0].toUpperCase())]
              : []),
          ],
        },
        ...this.contrattiAggiuntivi.map((c, i) => ({
          id: 'c' + (i + 2) + '_' + cf.substring(0, 8),
          tipo: 'obu',
          stato: 'attivo',
          dataAttivazione: now,
          iban: c.iban,
          totale: this.calcContrattoAggiuntoTotal(c),
          dispositivi: [
            { tipo: 'obu', codice: '', veicoloId: 'v_' + c.obu1Targa.toUpperCase(), furtoSmarrimento: c.obu1Furto, stato: 'attivo',
              serviziAbilitati: { areac: { attivo: false }, parcheggi: { attivo: false } } },
            ...(c.hasObu2 && c.obu2Targa ? [{ tipo: 'obu', codice: '', veicoloId: 'v_' + c.obu2Targa.toUpperCase(), furtoSmarrimento: c.obu2Furto, stato: 'attivo',
              serviziAbilitati: { areac: { attivo: false }, parcheggi: { attivo: false } } }] : []),
          ],
          serviziRsa: [
            ...(c.obu1Rsa && c.obu1Targa ? [mkRsa('v_' + c.obu1Targa.toUpperCase())] : []),
            ...(c.hasObu2 && c.obu2Rsa && c.obu2Targa ? [mkRsa('v_' + c.obu2Targa.toUpperCase())] : []),
            ...(c.rsaStandalone || []).filter(r => r.targa && r.targa.trim()).map(r => mkRsa('v_' + r.targa.toUpperCase())),
          ],
        })),
      ];

      // 3. Costruisce ClienteRecord aggiornando record esistente o creandone uno nuovo
      const baseRecord = existing || {
        cf,
        nome: this.cliente.nome,
        cognome: this.cliente.cognome,
        dataNascita: this.cliente.dataNascita,
        contatti: { telefono: this.cliente.telefono, email: this.cliente.email },
        indirizzo: { via: this.cliente.indirizzo, civico: this.cliente.civico, comune: this.cliente.comune, prov: this.cliente.provincia, cap: this.cliente.cap },
        dataRegistrazione: now,
        canale: 'stazione',
        veicoli: [],
        consensi: {
          privacy: false,
          informativaPrecontrattuale: false,
          terminiECondizioni: false,
          marketing: false,
          profilazione: false,
          mandatoSdd: false,
          dataFirma: null,
        },
        contratti: [],
        serviziAttivi: {
          strisceBlu: { attivo: false },
          memo:       { attivo: false },
        },
        _v3migrated: true,
        movimenti: [],
      };
      // Merge veicoli: unisci quelli nuovi con esistenti (deduplica per id)
      const existingVeicoliMap = new Map(baseRecord.veicoli.map(v => [v.id, v]));
      veicoli.forEach(v => existingVeicoliMap.set(v.id, v));
      const mergedVeicoli = Array.from(existingVeicoliMap.values());
      // Consensi: mantieni quelli esistenti, aggiorna mandatoSdd e dataFirma
      const mergedConsensi = {
        ...baseRecord.consensi,
        mandatoSdd: true,
        dataFirma: now,
      };
      // Primo OTP confermato → flag obbligatori (precontrattuale, privacy, T&C Memo) certificati in blocco
      const otpConfirmed = this.otpSmsStatus === 'confirmed';
      if (otpConfirmed) {
        mergedConsensi.informativaPrecontrattuale = true;
        mergedConsensi.privacy = true;
        mergedConsensi.terminiECondizioni = true;
      } else {
        // Fallback per vecchi flussi (mock/demo senza OTP): rispetta checkbox manuali
        if (this.consensiCrm.privacy) mergedConsensi.privacy = true;
        if (this.consensiCrm.informativaPrecontrattuale) mergedConsensi.informativaPrecontrattuale = true;
        if (this.consensiCrm.nAndCMemo) mergedConsensi.terminiECondizioni = true;
      }
      // Secondo OTP (firma contratto) confermato → accetta T&C Telepedaggio
      if (this.firmaStatus === 'signed') {
        mergedConsensi.terminiTelepedaggio = true;
      }
      if (this.consensiCrm.marketing) mergedConsensi.marketing = true;
      if (this.consensiCrm.profilazione) mergedConsensi.profilazione = true;
      // telefonoVerificato: se OTP confermato, oggetto pieno; altrimenti mantiene quello esistente o default
      const telefonoVerificato = otpConfirmed
        ? { verificato: true, numero: this.cliente.telefono || null, data: now }
        : (baseRecord.telefonoVerificato || { verificato: false, numero: null, data: null });
      const clienteRecord = {
        ...baseRecord,
        veicoli: mergedVeicoli,
        consensi: mergedConsensi,
        telefonoVerificato,
        contratti,
        _v3migrated: true,
        // serviziAttivi rimangono invariati (solo strisceBlu e memo)
      };

      // 1. Salva come source of truth in clientiDemo (PRIMA di emettere eventi)
      this._saveClienteDemo(clienteRecord);

      // 2. Payload evento cliente:registrato
      const payload = {
        nome: this.cliente.nome + ' ' + this.cliente.cognome,
        cf: this.cliente.cf,
        email: this.cliente.email,
        telefono: this.cliente.telefono,
        targhe: allTarghe,
        dataRegistrazione: now,
        consensiPrecompilati: {
          marketing: !!(this.consensiCrm.marketing),
          profilazione: !!(this.consensiCrm.profilazione),
        },
      };

      // 3. Emette evento cliente:registrato SOLO DOPO aver scritto clientiDemo
      Bus.emit('cliente:registrato', payload);
      // 4. Aggiorna alias retrocompatibilità
      localStorage.setItem('clienteProfile', JSON.stringify(payload));
      localStorage.setItem('clienteAttivo', this.cliente.cf);

      // Attiva ogni RSA con delay progressivo (emette veicoloId + targa)
      const allServiziRsa = contratti.flatMap(c => c.serviziRsa || []);
      for (let i = 0; i < allServiziRsa.length; i++) {
        await new Promise(r => setTimeout(r, 200 * (i + 1)));
        const rsa = allServiziRsa[i];
        Bus.emit('servizio:attivato', {
          servizio: 'rsa',
          veicoloId: rsa.veicoloId,
          targa: rsa.veicoloId.replace(/^v_/, ''),
          data: new Date().toISOString(),
        });
      }
      // Telepedaggio
      if (!isRsaOnly) {
        Bus.emit('servizio:attivato', { servizio: 'telepedaggio', veicoloId: 'v_' + obu1Targa, targa: obu1Targa, obu: this.obuCode, data: new Date().toISOString() });
        if (this.hasObu2 && obu2Targa) {
          Bus.emit('servizio:attivato', { servizio: 'telepedaggio', veicoloId: 'v_' + obu2Targa, targa: obu2Targa, obu: this.obuCode2, data: new Date().toISOString() });
        }
      }

      // Email benvenuto dopo 1.5s
      setTimeout(() => {
        this.emailConfermaVisible = true;
        this.showWelcomeModal = true;
        Bus.emit('email:outbound', {
          to: this.cliente.email,
          template: 'BENVENUTO',
          subject: 'Benvenuto in Enilive Mobility+ — copia contratto',
          preview: 'Benvenuto! In allegato la tua copia del contratto e le istruzioni di attivazione...',
          nome: this.cliente.nome,
        });
        this.showToastMsg('Email di benvenuto inviata a ' + (this.cliente.email || 'cliente'), 'success');
      }, 1500);

      window.scrollTo(0, 0);
    },

    // ============================================================
    // ASSISTENZA — HELPER MAPPING + RICERCA IN REGISTRY
    // ============================================================

    // Converte un record clientiDemo nel formato atteso da assistCliente
    _clienteDemoToAssist(r) {
      const fields = this._getAnagraficaFields(r);
      const via = [fields.indirizzo, fields.civico].filter(Boolean).join(' ');
      const residenza = { via, cap: fields.cap || '', citta: fields.comune || '', provincia: fields.provincia || '' };
      // veicoli: new schema (veicoli[]) oppure old (targhe[])
      const veicoli = Array.isArray(r.veicoli)
        ? r.veicoli.map(v => ({ targa: v.targa, tipo: v.tipo || 'Automobile', marca: v.marca || '—', modello: v.modello || '—' }))
        : (r.targhe || []).map(t => ({ targa: t, tipo: 'Automobile', marca: '—', modello: '—' }));
      // obu: new schema (dispositivi[]) oppure old (obu[])
      const obu = (r.contratti || []).flatMap(c =>
        Array.isArray(c.dispositivi)
          ? c.dispositivi.filter(d => d.tipo === 'obu').map(d => {
              const targa = (r.veicoli || []).find(v => v.id === d.veicoloId)?.targa || d.veicoloId?.replace(/^v_/, '') || '';
              const hasRsa = (c.serviziRsa || []).some(rs => rs.veicoloId === d.veicoloId && rs.stato === 'attivo');
              return { codice: d.codice, targa, rsa: hasRsa, furto: !!d.furtoSmarrimento, stato: d.stato || 'attivo',
                       serviziAbilitati: d.serviziAbilitati };
            })
          : (c.obu || []).map(o => ({ codice: o.codice, targa: o.targa, rsa: !!o.rsa, furto: !!o.furto, stato: o.stato || 'attivo' }))
      );
      const sa = r.serviziAttivi || {};
      const hasAnyRsa       = (r.contratti || []).some(c => (c.serviziRsa || []).some(rs => rs.stato === 'attivo'));
      const hasAnyAreaC     = (r.contratti || []).some(c => (c.dispositivi || []).some(d => d.serviziAbilitati?.areac?.attivo));
      const hasAnyParcheggi = (r.contratti || []).some(c => (c.dispositivi || []).some(d => d.serviziAbilitati?.parcheggi?.attivo));
      const serviziAttivi = [
        ...(obu.some(o => o.stato === 'attivo') ? ['telepedaggio'] : []),
        ...(hasAnyRsa       ? ['rsa']      : []),
        ...(hasAnyAreaC     ? ['areac']    : []),
        ...(hasAnyParcheggi ? ['parcheggi']: []),
        ...Object.keys(sa).filter(k => sa[k]?.attivo),
      ];
      const primoContratto = (r.contratti || [])[0];
      return {
        cf: r.cf,
        nome: r.nome || '',
        cognome: r.cognome || '',
        email: fields.email,
        cellulare: fields.telefono,
        residenza,
        domicilio: residenza,
        veicoli,
        contratti: r.contratti || [],
        obu,
        serviziAttivi,
        metodoPagamento: primoContratto
          ? { tipo: 'iban', valore: primoContratto.iban || '—' }
          : { tipo: 'iban', valore: '—' },
        rimodulazioni: [],
        ticketAperti: 0,
        fatture: [],
        movimenti: r.movimenti || [],
      };
    },

    // Cerca un cliente in clientiDemo per CF, targa o contatto
    _searchClientiDemo(query, tipo) {
      const reg = this._getClientiDemo();
      const q = query.trim().toUpperCase();
      if (!q) return null;
      if (tipo === 'cf') {
        return reg[q] || null;
      } else if (tipo === 'targa') {
        return Object.values(reg).find(c =>
          (c.veicoli || []).some(v => v.targa.toUpperCase() === q)
          || (c.targhe || []).some(t => t.toUpperCase() === q)
        ) || null;
      } else {
        // contatto: email o telefono
        const ql = query.trim().toLowerCase();
        return Object.values(reg).find(c => {
          const email    = c.contatti?.email    || c.email    || '';
          const telefono = c.contatti?.telefono || c.telefono || '';
          return email.toLowerCase().includes(ql)
            || telefono.replace(/\s/g, '').includes(query.trim().replace(/\s/g, ''));
        }) || null;
      }
    },

    // Cerca cliente per CF o targa (per quick-obu)
    _searchCfOTarga(query) {
      const reg = this._getClientiDemo();
      const q = query.trim().toUpperCase();
      if (!q) return null;
      if (reg[q]) return reg[q];
      return Object.values(reg).find(c =>
        (c.veicoli || []).some(v => v.targa.toUpperCase() === q)
        || (c.targhe || []).some(t => t.toUpperCase() === q)
      ) || null;
    },

    // Cerca cliente che possiede un dato OBU (codice OBU in qualsiasi contratto)
    _searchObuInDemo(obuCode) {
      const reg = this._getClientiDemo();
      const code = obuCode.trim().toUpperCase();
      return Object.values(reg).find(c =>
        (c.contratti || []).some(ct =>
          (ct.dispositivi || []).some(d => d.tipo === 'obu' && d.codice.toUpperCase() === code)
          || (ct.obu || []).some(o => o.codice.toUpperCase() === code)
        )
      ) || null;
    },

    // ============================================================
    // ASSISTENZA — RICERCA CLIENTE
    // ============================================================
    cercaCliente() {
      if (!this.assistSearchQuery.trim()) return;
      this.assistSearchLoading = true;
      this.assistSearchNotFound = false;
      setTimeout(() => {
        this.assistSearchLoading = false;
        const raw = this._searchClientiDemo(this.assistSearchQuery, this.assistSearchType);
        if (!raw) {
          this.assistSearchNotFound = true;
          return;
        }
        this.assistCliente = this._clienteDemoToAssist(raw);
        const c = this.assistCliente;
        Object.assign(this.assistForm, {
          resVia: c.residenza.via,   resCap: c.residenza.cap,
          resCitta: c.residenza.citta, resProvincia: c.residenza.provincia,
          domVia: c.domicilio.via,   domCap: c.domicilio.cap,
          domCitta: c.domicilio.citta, domProvincia: c.domicilio.provincia,
          email: c.email,
          cellulare: c.cellulare,
          veicoli: JSON.parse(JSON.stringify(c.veicoli)),
        });
        this.assistStep = 'scheda';
        this.showToastMsg('Cliente trovato: ' + c.nome + ' ' + c.cognome, 'success');
      }, 500);
    },

    // ============================================================
    // ASSISTENZA — NAVIGAZIONE GRIGLIA
    // ============================================================
    _checkAnagraficaPreAzione(azione) {
      const c = this.assistCliente;
      if (!c) return true;
      const rawRecord = this._getClientiDemo()[c.cf?.toUpperCase()];
      const missing = [];
      if (!c.nome?.trim())      missing.push('nome');
      if (!c.cognome?.trim())   missing.push('cognome');
      if (!c.cellulare?.trim()) missing.push('telefono');
      if (!c.email?.trim())     missing.push('email');
      if (!rawRecord?.consensi?.privacy) missing.push('privacy');
      if (!rawRecord?.consensi?.mandatoSdd) missing.push('mandatoSdd');
      if (missing.length === 0) return true;
      this.missingFields = missing;
      this.aggiornaDatiForm = {
        nome:       c.nome || '',
        cognome:    c.cognome || '',
        telefono:   c.cellulare || '',
        email:      c.email || '',
        privacy:    !!rawRecord?.consensi?.privacy,
        mandatoSdd: !!rawRecord?.consensi?.mandatoSdd,
      };
      this.quickObuNextStep = 'flusso';
      this.assistAzione = azione;
      this.assistStep = 'aggiorna-scheda';
      window.scrollTo(0, 0);
      this.showToastMsg('Dati obbligatori mancanti — compila il form per procedere', 'error', 4000);
      return false;
    },

    avviaAzione(azione) {
      this.resetAssistOp();
      if (!this._checkAnagraficaPreAzione(azione)) return;
      this.assistAzione = azione;
      this.assistStep = 'flusso';
      window.scrollTo(0, 0);
    },

    simulaScansionObu() {
      this.obuScannerStatus = 'scanning';
      // Trova il primo OBU disponibile nel registry per simulare la scansione
      const reg = this._getClientiDemo();
      let scannedCode = null;
      let rawCliente = null;
      for (const record of Object.values(reg)) {
        for (const c of (record.contratti || [])) {
          const obus = Array.isArray(c.dispositivi)
            ? c.dispositivi.filter(d => d.tipo === 'obu')
            : (c.obu || []);
          if (obus.length > 0) {
            scannedCode = obus[0].codice;
            rawCliente = record;
            break;
          }
        }
        if (scannedCode) break;
      }
      setTimeout(() => {
        if (!scannedCode || !rawCliente) {
          // Registry vuoto: simulazione fallisce
          this.obuScannerStatus = null;
          this.showToastMsg('Nessun OBU nel registro — resettare demo o registrare un cliente', 'error', 4000);
          return;
        }
        this.obuScannedCode = scannedCode;
        setTimeout(() => {
          this.obuScannerStatus = 'found';
          this.quickObuSearchStatus = 'found';
          this.quickObuSearchResult = this._clienteDemoToAssist(rawCliente);
          this.showToastMsg('OBU riconosciuto — cliente trovato', 'success');
        }, 350);
      }, 1800);
    },

    cercaObuManuale() {
      if (!this.obuManualCode.trim()) return;
      this.obuManualSearchStatus = null;
      const raw = this._searchObuInDemo(this.obuManualCode.trim());
      if (!raw) {
        this.obuManualSearchStatus = 'notfound';
        return;
      }
      this.obuScannedCode = this.obuManualCode.trim();
      this.obuScannerStatus = 'found';
      this.quickObuSearchStatus = 'found';
      this.quickObuSearchResult = this._clienteDemoToAssist(raw);
      this.showToastMsg('OBU trovato — cliente identificato', 'success');
    },

    cercaClienteQuickObu(searchType) {
      if (!this.quickObuSearchQuery.trim()) return;
      this.quickObuSearchLoading = true;
      this.quickObuSearchStatus = null;
      setTimeout(() => {
        this.quickObuSearchLoading = false;
        const tipo = searchType || 'cf';
        const raw = this._searchClientiDemo(this.quickObuSearchQuery, tipo);
        if (!raw) {
          this.quickObuSearchStatus = 'notfound';
          this.quickObuSearchResult = null;
        } else {
          this.quickObuSearchStatus = 'found';
          this.quickObuSearchResult = this._clienteDemoToAssist(raw);
          this.showToastMsg('Cliente trovato — verifica i dati e conferma', 'success');
        }
      }, 500);
    },

    confermaProcediQuickObu() {
      this.assistCliente = this.quickObuSearchResult;
      const c = this.assistCliente;
      Object.assign(this.assistForm, {
        resVia: c.residenza.via,   resCap: c.residenza.cap,
        resCitta: c.residenza.citta, resProvincia: c.residenza.provincia,
        domVia: c.domicilio.via,   domCap: c.domicilio.cap,
        domCitta: c.domicilio.citta, domProvincia: c.domicilio.provincia,
        email: c.email, cellulare: c.cellulare,
        veicoli: JSON.parse(JSON.stringify(c.veicoli)),
      });
      if (this.quickObuAction === 'sostituisci-obu' && this.obuScannedCode) {
        this.assistForm.obuSelezionato = this.obuScannedCode;
        const obuEntry = (c.obu || []).find(o => o.codice === this.obuScannedCode) || (c.obu || [])[0];
        if (obuEntry) {
          const raws = this._getClientiDemo()[c.cf?.toUpperCase()];
          const rsaEntry = (raws?.contratti || []).flatMap(ct => ct.serviziRsa || [])
            .find(r => r.veicoloId === 'v_' + obuEntry.targa && r.stato === 'attivo');
          if (rsaEntry) {
            this.assistForm.codicePolizzaRsa = rsaEntry.codicePolizza || '';
            this.assistForm.rsaVeicoloIdSostituzione = rsaEntry.veicoloId;
          }
        }
      }
      if (this.quickObuAction === 'cambio-pagamento') {
        this.assistForm.contrattoSelezionato = this.quickPagamentoContrattoId;
        this.assistForm.iban = '';
      }
      if (!this._checkAnagraficaPreAzione(this.quickObuAction)) {
        this.quickObuAction = null;
        this.quickObuSearchStatus = null;
        this.quickPagamentoContrattoId = null;
        return;
      }
      this.assistAzione = this.quickObuAction;
      this.assistStep = 'flusso';
      this.quickObuAction = null;
      this.quickObuSearchStatus = null;
      this.quickPagamentoContrattoId = null;
      this.resetAssistOp();
      window.scrollTo(0, 0);
      this.showToastMsg('Accesso rapido a: ' + this.assistAzioneLabel(this.assistAzione), 'info');
    },

    // ============================================================
    // ASSISTENZA — STEP AGGIORNA-SCHEDA
    // ============================================================
    salvaAggiornaDati() {
      const cf = this.assistCliente?.cf;
      if (!cf) return;
      const reg = this._getClientiDemo();
      const r = reg[cf.toUpperCase()];
      if (!r) return;
      if (this.missingFields.includes('nome') && this.aggiornaDatiForm.nome.trim()) {
        r.nome = this.aggiornaDatiForm.nome.trim();
        this.assistCliente.nome = r.nome;
      }
      if (this.missingFields.includes('cognome') && this.aggiornaDatiForm.cognome.trim()) {
        r.cognome = this.aggiornaDatiForm.cognome.trim();
        this.assistCliente.cognome = r.cognome;
      }
      if (!r.contatti) r.contatti = {};
      if (this.missingFields.includes('telefono') && this.aggiornaDatiForm.telefono.trim()) {
        r.contatti.telefono = this.aggiornaDatiForm.telefono.trim();
        this.assistCliente.cellulare = r.contatti.telefono;
      }
      if (this.missingFields.includes('email') && this.aggiornaDatiForm.email.trim()) {
        r.contatti.email = this.aggiornaDatiForm.email.trim();
        this.assistCliente.email = r.contatti.email;
      }
      if (this.missingFields.includes('privacy')) {
        if (!r.consensi) r.consensi = {};
        r.consensi.privacy = !!this.aggiornaDatiForm.privacy;
      }
      if (this.missingFields.includes('mandatoSdd')) {
        if (!r.consensi) r.consensi = {};
        r.consensi.mandatoSdd = !!this.aggiornaDatiForm.mandatoSdd;
      }
      this._saveClienteDemo(r);
      Bus.emit('cliente:profilo_aggiornato', r);
      const nextStep = this.quickObuNextStep || 'flusso';
      this.missingFields = [];
      this.quickObuNextStep = null;
      this.resetAssistOp();
      this.assistStep = nextStep;
      window.scrollTo(0, 0);
      this.showToastMsg('Dati aggiornati — procedendo con l\'operazione', 'success');
    },

    // ============================================================
    // ASSISTENZA — RECUPERO CREDENZIALI
    // ============================================================
    cercaClienteRecupero() {
      if (!this.recuperoSearchQuery.trim()) return;
      this.recuperoSearchStatus = null;
      const raw = this._searchCfOTarga(this.recuperoSearchQuery);
      if (!raw) {
        this.recuperoSearchStatus = 'notfound';
        return;
      }
      const fields = this._getAnagraficaFields(raw);
      this.recuperoRawCf = raw.cf;
      this.recuperoResult = { nome: fields.nome, cognome: fields.cognome, email: fields.email };
      this.recuperoEmailEditing = false;
      this.recuperoNewEmail = '';
      this.recuperoSearchStatus = 'found';
    },

    salvaEmailRecupero() {
      if (!this.recuperoNewEmail.trim() || !this.recuperoRawCf) return;
      const reg = this._getClientiDemo();
      const r = reg[this.recuperoRawCf.toUpperCase()];
      if (!r) return;
      if (!r.contatti) r.contatti = {};
      r.contatti.email = this.recuperoNewEmail.trim();
      this._saveClienteDemo(r);
      this.recuperoResult.email = r.contatti.email;
      this.recuperoEmailEditing = false;
      this.showToastMsg('Email aggiornata', 'success');
    },

    // ============================================================
    // ASSISTENZA — CAMBIO METODO DI PAGAMENTO
    // ============================================================
    cercaClienteCambioPag() {
      if (!this.cambioPagSearchQuery.trim()) return;
      this.cambioPagSearchStatus = null;
      const raw = this._searchCfOTarga(this.cambioPagSearchQuery);
      if (!raw) {
        this.cambioPagSearchStatus = 'notfound';
        return;
      }
      this.cambioPagRawCf = raw.cf;
      const veicoli = raw.veicoli || [];
      this.cambioPagContratti = (raw.contratti || []).map(c => {
        const targhe = (c.dispositivi || [])
          .filter(d => d.tipo === 'obu')
          .map(d => veicoli.find(v => v.id === d.veicoloId)?.targa || d.veicoloId?.replace(/^v_/, '') || '—');
        return { ...c, targhe, ibanEdit: '', ibanVerifyStatus: null, saving: false, savedOk: false };
      });
      this.cambioPagSearchStatus = 'found';
    },

    verificaIbanCambio(idx) {
      this.cambioPagContratti[idx].ibanVerifyStatus = 'verifying';
      setTimeout(() => {
        this.cambioPagContratti[idx].ibanVerifyStatus = 'ok';
      }, 2000);
    },

    salvaIbanCambio(idx) {
      if (!this.cambioPagRawCf) return;
      const c = this.cambioPagContratti[idx];
      c.saving = true;
      setTimeout(() => {
        const reg = this._getClientiDemo();
        const r = reg[this.cambioPagRawCf.toUpperCase()];
        if (r && Array.isArray(r.contratti)) {
          const ci = r.contratti.findIndex(x => x.id === c.id);
          if (ci !== -1) {
            r.contratti[ci].iban = c.ibanEdit.trim().toUpperCase();
            this._saveClienteDemo(r);
            c.iban = r.contratti[ci].iban;
            c.ibanEdit = '';
            c.ibanVerifyStatus = null;
          }
        }
        c.savedOk = true;
        c.saving = false;
        this.showToastMsg('IBAN aggiornato per ' + c.id, 'success');
      }, 400);
    },

    // ============================================================
    // ASSISTENZA — OTP SIMULATO
    // ============================================================
    inviaOtp() {
      this.assistOtpSent = true;
      this.showToastMsg('OTP inviato al cliente', 'info');
    },

    confermaOtp() {
      const val = this.assistOtpValue.trim();
      if (/^\d{6}$/.test(val)) {
        this.assistOtpConfirmed = true;
        this.showToastMsg('OTP verificato', 'success');
      } else {
        this.showToastMsg('OTP non valido — inserisci 6 cifre', 'error');
      }
    },

    // ============================================================
    // ASSISTENZA — UTILITY FORM
    // ============================================================
    simulaScanObu() {
      this.assistForm.obuScanning = true;
      setTimeout(() => {
        this.assistForm.nuovoObu = 'OBU-002-2026';
        this.assistForm.obuScanning = false;
        this.showToastMsg('OBU scansionato: OBU-002-2026', 'success');
      }, 1200);
    },

    checkTarga() {
      this.assistForm.targaWarning = this.assistForm.nuovaTarga.toUpperCase().trim() === 'AA000AA';
    },

    simulaScanRmpp() {
      this.assistForm.rmppScanning = true;
      setTimeout(() => {
        this.assistForm.codiceRmpp = 'RMPP-2026-00789';
        this.assistForm.rmppScanning = false;
        this.showToastMsg('RMPP scansionato: RMPP-2026-00789', 'success');
      }, 1500);
    },

    // ============================================================
    // ASSISTENZA — CONFERMA OPERAZIONE + BUS EVENTS
    // ============================================================
    confermaOperazione(azione) {
      this.assistOpLoading = true;
      setTimeout(() => {
        this.assistOpLoading = false;
        this.assistOpSuccess = true;
        const cf = this.assistCliente.cf;

        switch (azione) {
          case 'aggiorna-residenza': {
            try {
              const clienti = JSON.parse(localStorage.getItem('clientiDemo') || '{}');
              const rec = clienti[cf.toUpperCase()];
              if (rec) {
                if (!rec.indirizzo) rec.indirizzo = {};
                rec.indirizzo.via    = this.assistForm.resVia.trim();
                rec.indirizzo.comune = this.assistForm.resCitta.trim();
                rec.indirizzo.prov   = this.assistForm.resProvincia.trim().toUpperCase();
                rec.indirizzo.cap    = this.assistForm.resCap.trim();
                localStorage.setItem('clientiDemo', JSON.stringify(clienti));
                Bus.emit('cliente:profilo_aggiornato', rec);
              }
            } catch(e) { console.error('aggiorna-residenza write error', e); }
            Bus.emit('assistenza:dati_aggiornati', { cf, campo: 'indirizzo', valore: this.assistForm.resVia, canale: 'store' });
            this.showToastMsg('Dati aggiornati', 'success');
            break;
          }
          case 'aggiorna-contatti': {
            try {
              const clienti = JSON.parse(localStorage.getItem('clientiDemo') || '{}');
              const rec = clienti[cf.toUpperCase()];
              if (rec) {
                if (!rec.contatti) rec.contatti = {};
                rec.contatti.email    = this.assistForm.email.trim();
                rec.contatti.telefono = this.assistForm.cellulare.trim();
                localStorage.setItem('clientiDemo', JSON.stringify(clienti));
                Bus.emit('cliente:profilo_aggiornato', rec);
              }
            } catch(e) { console.error('aggiorna-contatti write error', e); }
            Bus.emit('assistenza:dati_aggiornati', { cf, campo: 'contatti', valore: { email: this.assistForm.email, cellulare: this.assistForm.cellulare }, canale: 'store' });
            this.showToastMsg('Dati di contatto aggiornati', 'success');
            break;
          }
          case 'aggiorna-veicolo': {
            try {
              const clienti = JSON.parse(localStorage.getItem('clientiDemo') || '{}');
              const rec = clienti[cf.toUpperCase()];
              if (rec && Array.isArray(rec.veicoli)) {
                this.assistForm.veicoli.forEach(v => {
                  const idx = rec.veicoli.findIndex(rv => rv.targa === v.targa);
                  if (idx !== -1) {
                    rec.veicoli[idx].tipo    = v.tipo;
                    rec.veicoli[idx].marca   = v.marca;
                    rec.veicoli[idx].modello = v.modello;
                  }
                });
                localStorage.setItem('clientiDemo', JSON.stringify(clienti));
                Bus.emit('cliente:profilo_aggiornato', rec);
              }
            } catch(e) { console.error('aggiorna-veicolo write error', e); }
            Bus.emit('assistenza:veicolo_aggiornato', { cf, targa: (this.assistForm.veicoli[0] || {}).targa, operazione: 'modifica' });
            this.showToastMsg('Veicolo aggiornato', 'success');
            break;
          }
          case 'sostituisci-obu': {
            const obuVecchio = this.assistForm.obuSelezionato;
            const obuNuovo = this.assistForm.nuovoObu;
            try {
              const clienti = JSON.parse(localStorage.getItem('clientiDemo') || '{}');
              const rec = clienti[cf.toUpperCase()];
              if (rec) {
                (rec.contratti || []).forEach(c => {
                  (c.dispositivi || []).forEach(d => {
                    if (d.tipo === 'obu' && d.codice === obuVecchio) d.codice = obuNuovo;
                  });
                });
                const rsaVid = this.assistForm.rsaVeicoloIdSostituzione;
                const codicePolizza = this.assistForm.codicePolizzaRsa.trim();
                if (rsaVid && codicePolizza) {
                  for (const ct of (rec.contratti || [])) {
                    const rsaEntry = (ct.serviziRsa || []).find(r => r.veicoloId === rsaVid && r.stato === 'attivo');
                    if (rsaEntry) { rsaEntry.codicePolizza = codicePolizza; break; }
                  }
                }
                localStorage.setItem('clientiDemo', JSON.stringify(clienti));
              }
            } catch(e) { console.error('sostituisci-obu write error', e); }
            Bus.emit('assistenza:obu_sostituito', { cf, obu_vecchio: obuVecchio, obu_nuovo: obuNuovo, targa: (this.assistCliente.obu[0] || {}).targa });
            this.showToastMsg('OBU sostituito. Aggiornamento whitelist avviato.', 'success', 4000);
            break;
          }
          case 'cambio-targa-obu': {
            const nuovaTarga = this.assistForm.nuovaTarga.toUpperCase();
            const obuCode   = this.assistForm.obuSelezionato;
            const targaVecchia = (this.assistCliente.obu ? (this.assistCliente.obu[0] || {}).targa : null)
              || (this.assistCliente.dispositivi ? (this.assistCliente.dispositivi[0] || {}).veicoloId?.replace(/^v_/, '') : null);
            try {
              const clienti = JSON.parse(localStorage.getItem('clientiDemo') || '{}');
              const rec = clienti[cf.toUpperCase()];
              if (rec) {
                (rec.contratti || []).forEach(c => {
                  (c.dispositivi || []).forEach(d => {
                    if (d.tipo === 'obu' && (!obuCode || d.codice === obuCode)) d.veicoloId = 'v_' + nuovaTarga;
                  });
                });
                syncVeicoli(rec);
                localStorage.setItem('clientiDemo', JSON.stringify(clienti));
              }
            } catch(_) {}
            Bus.emit('assistenza:targa_cambiata', { cf, obu: obuCode, targa_vecchia: targaVecchia, targa_nuova: nuovaTarga });
            this.showToastMsg('Targa aggiornata. Whitelist in aggiornamento.', 'success');
            break;
          }
          case 'furto-obu': {
            const obuCodeFurto = this.assistForm.obuSelezionato;
            try {
              const clienti = JSON.parse(localStorage.getItem('clientiDemo') || '{}');
              const rec = clienti[cf.toUpperCase()];
              if (rec) {
                (rec.contratti || []).forEach(c =>
                  (c.dispositivi || []).forEach(d => {
                    if (d.tipo === 'obu' && d.codice === obuCodeFurto) {
                      d.furtoSmarrimento = true;
                      d.stato = 'smarrito';
                    }
                  })
                );
                localStorage.setItem('clientiDemo', JSON.stringify(clienti));
              }
            } catch(e) { console.error('furto-obu write error', e); }
            Bus.emit('assistenza:obu_bloccato', { cf, obu: obuCodeFurto, targa: (this.assistCliente.obu[0] || {}).targa, motivo: 'furto' });
            this.showToastMsg('OBU inserito in blacklist entro 12 ore', 'success', 4000);
            break;
          }
          case 'restituzione-obu': {
            const obuCodeRest = this.assistForm.obuSelezionato;
            try {
              const clienti = JSON.parse(localStorage.getItem('clientiDemo') || '{}');
              const rec = clienti[cf.toUpperCase()];
              if (rec) {
                (rec.contratti || []).forEach(c => {
                  (c.dispositivi || []).forEach(d => {
                    if (d.tipo === 'obu' && d.codice === obuCodeRest) d.stato = 'restituito';
                  });
                  const obus = (c.dispositivi || []).filter(d => d.tipo === 'obu');
                  if (obus.length > 0 && obus.every(d => d.stato === 'restituito')) c.stato = 'cessato';
                });
                localStorage.setItem('clientiDemo', JSON.stringify(clienti));
              }
            } catch(e) { console.error('restituzione-obu write error', e); }
            Bus.emit('assistenza:obu_restituito', { cf, obu: obuCodeRest, targa: (this.assistCliente.obu[0] || {}).targa });
            this.showToastMsg('Restituzione registrata. Stock aggiornato.', 'success');
            break;
          }
          case 'modifica-pagamento':
            Bus.emit('assistenza:pagamento_aggiornato', { cf, tipo: this.assistForm.tipoPagamento });
            this.showToastMsg('Metodo di pagamento aggiornato', 'success');
            break;
          case 'cambio-pagamento': {
            try {
              const clienti = JSON.parse(localStorage.getItem('clientiDemo') || '{}');
              const cfKey = cf.toUpperCase();
              if (clienti[cfKey] && clienti[cfKey].contratti) {
                const contratto = clienti[cfKey].contratti.find(c => c.id === this.assistForm.contrattoSelezionato);
                if (contratto) {
                  contratto.iban = this.assistForm.iban.toUpperCase();
                  localStorage.setItem('clientiDemo', JSON.stringify(clienti));
                }
              }
            } catch(e) {}
            Bus.emit('assistenza:pagamento_aggiornato', { cf, contrattoId: this.assistForm.contrattoSelezionato, tipo: 'iban', iban: this.assistForm.iban });
            this.showToastMsg('IBAN aggiornato con successo', 'success');
            break;
          }
          case 'adesione-rimodulazione':
            Bus.emit('assistenza:rimodulazione_attivata', { cf, tipo_rimodulazione: this.assistForm.tipoRimodulazione });
            this.showToastMsg('Rimodulazione attivata', 'success');
            break;
          case 'revoca-rimodulazione':
            Bus.emit('assistenza:rimodulazione_revocata', { cf, tipo_rimodulazione: this.assistForm.rimodulazioneSelezionata || 'sconto_moto' });
            this.showToastMsg('Rimodulazione revocata. Flusso Discounted List inviato.', 'success', 4000);
            break;
          case 'disattivazione-servizio': {
            try {
              const clienti = JSON.parse(localStorage.getItem('clientiDemo') || '{}');
              const rec = clienti[cf.toUpperCase()];
              if (rec) {
                this.assistForm.serviziDaDisattivare.forEach(s => {
                  if (['strisceBlu', 'memo'].includes(s)) {
                    if (!rec.serviziAttivi) rec.serviziAttivi = {};
                    if (!rec.serviziAttivi[s]) rec.serviziAttivi[s] = {};
                    rec.serviziAttivi[s].attivo = false;
                  } else if (['areac', 'parcheggi'].includes(s)) {
                    (rec.contratti || []).forEach(c =>
                      (c.dispositivi || []).forEach(d => {
                        if (d.serviziAbilitati?.[s]) d.serviziAbilitati[s].attivo = false;
                      })
                    );
                  } else if (s === 'rsa') {
                    (rec.contratti || []).forEach(c =>
                      (c.serviziRsa || []).forEach(r => { if (r.stato === 'attivo') r.stato = 'cessato'; })
                    );
                  }
                });
                localStorage.setItem('clientiDemo', JSON.stringify(clienti));
              }
            } catch(e) { console.error('disattivazione-servizio write error', e); }
            this.assistForm.serviziDaDisattivare.forEach(s => {
              Bus.emit('assistenza:servizio_disattivato', { cf, servizio: s });
            });
            this.showToastMsg('Servizio disattivato', 'success');
            break;
          }
          case 'richiesta-fattura':
            Bus.emit('assistenza:documento_inviato', { cf, tipo: 'fattura', email: this.assistCliente.email });
            this.showToastMsg('Fattura inviata a ' + this.assistCliente.email, 'success');
            break;
          case 'nota-spese':
            Bus.emit('assistenza:documento_inviato', { cf, tipo: 'nota_spese', email: this.assistCliente.email });
            this.showToastMsg('Nota spese inviata a ' + this.assistCliente.email, 'success');
            break;
          case 'scansione-rmpp':
            Bus.emit('assistenza:rmpp_registrato', { cf, codice_rmpp: this.assistForm.codiceRmpp, importo: 18.50 });
            this.showToastMsg('RMPP registrato', 'success');
            break;
          case 'mancata-stazione':
            Bus.emit('assistenza:transito_segnalato', { cf, transito_id: this.assistForm.transitoSelezionato, tipo: 'mancata_stazione' });
            this.showToastMsg('Segnalazione inviata alla concessionaria. Ticket aperto.', 'success', 4000);
            break;
          case 'disconoscimento-transito':
            Bus.emit('assistenza:transito_segnalato', { cf, transito_id: this.assistForm.transitoSelezionato, tipo: 'disconoscimento', motivo: this.assistForm.motivoDisconoscimento });
            this.showToastMsg('Pratica inviata alla concessionaria. Ticket aperto.', 'success', 4000);
            break;
          case 'apri-ticket': {
            const num = 'TKT-2026-' + String(Math.floor(Math.random() * 90000) + 10000);
            Bus.emit('assistenza:ticket_aperto', { cf, numero_ticket: num, categoria: this.assistForm.ticketCategoria, tipologia: this.assistForm.ticketTipologia });
            this.showToastMsg('Ticket aperto: ' + num + '. Email di conferma inviata al cliente.', 'success', 5000);
            break;
          }
          case 'feedback':
            Bus.emit('assistenza:feedback_registrato', { cf, rating: this.assistForm.feedbackRating, note: this.assistForm.feedbackNote });
            this.showToastMsg('Feedback registrato', 'success');
            break;
          case 'recupero-credenziali':
            Bus.emit('assistenza:credenziali_recuperate', { cf, canale: this.assistForm.canaleCredenziali });
            this.showToastMsg('Link di reset password inviato al cliente', 'success');
            break;
        }

        // Torna alla griglia dopo 2s
        setTimeout(() => {
          this.assistStep = 'griglia';
          this.assistAzione = null;
          this.resetAssistOp();
        }, 2000);
      }, 800);
    },

    // ============================================================
    // DEMO SHORTCUTS — ASSISTENZA
    // ============================================================

      await this.completaOnboarding();
    },
  };
}
